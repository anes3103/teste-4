<body>
    <nav>

    <section class="login-container">
        <div class="login-box glass-card">
            <div class="lock-icon">
                <i class="fas fa-user-shield"></i>
            </div>
            <h2>Área Interna</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px; font-size: 0.9rem;">
                Insira a chave de acesso para visualizar o quadro de especialistas.
            </p>

            <div class="dadoscadastro">
                <input type="password" id="accessKey" placeholder="CHAVE DE ACESSO" autocomplete="off">
                <div id="error" class="error-msg">Chave de acesso inválida.</div>
                <button class="btn" onclick="verifyAccess()" style="width: 100%;">Validar Entrada</button>
            </div>
        </div>
